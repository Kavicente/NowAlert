<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
</head>
<body>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
     
    <form class="form2" action="/login" method="post">
        <h1>Log In</h1>
        <label>Barangay: <input type="text" name="barangay" required></label><br>
        <label>Contact Number: <input type="tel" name="contact_no" required></label><br>
        <label>Password: <input type="password" name="password" required></label><br>
        
        <button class="button3" type="submit">Log In</button>
        <button class="button4" onclick="window.location.href='/signup_na'">Sign Up</button>
        <button class="button2" onclick="window.location.href='/choose_login_type'">Choose Account</button>
        <h2>Quick Login</h2>
        <div class="form3">
            {% for credential in credentials %}
                <p onclick="autoLogin('{{ credential.barangay | default('') | safe }}', '{{ credential.contact_no | safe }}', '{{ credential.password | safe }}')">
                    {{ credential.display | safe }}
                </p>
            {% endfor %}
        </div>
    </form>
    <script>
        function autoLogin(barangay, contactNo, password) {
            console.log('AutoLogin:', barangay, contactNo, password);
            document.getElementById('barangay').value = barangay;
            document.getElementById('contact_no').value = contactNo;
            document.getElementById('password').value = password;
            console.log('Submitting form');
            document.getElementById('loginForm').submit();
        }
    </script>
</body>
</html>
