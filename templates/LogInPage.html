<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
</head>
<body>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
     <script>
        function autoLogin(role, municipality, contactNo, password) {
            console.log('AutoLogin:', role, municipality, contactNo, password);
            document.getElementById('role').value = role;
            document.getElementById('municipality').value = municipality;
            document.getElementById('contact_no').value = contactNo;
            document.getElementById('password').value = password;
            console.log('Submitting form');
            document.getElementById('loginForm').submit();
        }

        function loadCredentials() {
        fetch('/api/get_credentials')
            .then(response => response.json())
            .then(data => {
                const form3 = document.querySelector('.form3');
                form3.innerHTML = '';
                data.forEach(cred => {
                    if (cred.role === 'barangay') {
                        const p = document.createElement('p');
                        p.textContent = cred.display;
                        p.onclick = () => autoLogin(cred.barangay, cred.contact_no, cred.password);
                        form3.appendChild(p);
                    }
                });
            })
            .catch(error => console.error('Error fetching credentials:', error));
    }
    window.onload = loadCredentials;
    </script>
    <form class="form2" action="/login" method="post">
        <h1>Log In</h1>
        <label>Barangay: <input type="text" name="barangay" required></label><br>
        <label>Contact Number: <input type="tel" name="contact_no" required></label><br>
        <label>Password: <input type="password" name="password" required></label><br>
        
        <button class="button3" type="submit">Log In</button>
        <button class="button4" onclick="window.location.href='/signup_na'">Sign Up</button>
        <button class="button2" onclick="window.location.href='/choose_login_type'">Choose Account</button>
        <h2>Quick Login</h2>
        <div class="form3">
            {% for credential in credentials %}
                <p onclick="autoLogin('{{ credential.role }}', '{{ credential.municipality | default('') }}', '{{ credential.contact_no }}', '{{ credential.password }}')">
                    {{ credential.display }}
                </p>
            {% endfor %}
        </div>
    </form>
</body>
</html>
